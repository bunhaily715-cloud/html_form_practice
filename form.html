<!DOCTYPE html>
<html>
<head>
    <title>Input Types Practice Form</title>
</head>
<body>

    <h1>Input Types Practice Form</h1>

    <form>

        <label>Text:</label><br>
        <input type="text" placeholder="Text input"><br><br>

        <label>Email:</label><br>
        <input type="email" value="admin"><br><br>

        <label>Password:</label><br>
        <input type="password" value="1234"><br><br>

        <label>Number:</label><br>
        <input type="number"><br><br>

        <label>Phone:</label><br>
        <input type="tel" placeholder="+855..."><br><br>

        <label>Website:</label><br>
        <input type="url" placeholder="https://..."><br><br>

        <label>Date:</label><br>
        <input type="date"><br><br>

        <label>Time:</label><br>
        <input type="time"><br><br>

        <label>Date & Time:</label><br>
        <input type="datetime-local"><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <input type="radio" name="gender"> Other
        <br><br>

        <label>Hobbies:</label><br>
        <input type="checkbox"> Football
        <input type="checkbox"> Coding
        <input type="checkbox"> Music
        <br><br>

        <label>Search:</label><br>
        <input type="search" placeholder="Search..."><br><br>

        <label>Message:</label><br>
        <textarea rows="4" cols="30"></textarea><br><br>

        <label>Country:</label><br>
        <select>
            <option>USA</option>
            <option>Cambodia</option>
            <option>Thailand</option>
            <option>Vietnam</option>
        </select>
        <br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
